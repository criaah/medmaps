<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fibrilación auricular — MedMaps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/viewer.css?v=5">
<link rel="stylesheet" href="css/mindmap-tree.css?v=5">
</head>
<body data-theme="amboss">

<!-- ============ MOBILE BOTTOM NAV ============ -->
<nav class="mobile-nav">
  <button class="mnav-btn" id="mnBiblio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v16H4zM4 9h16M9 4v16"/></svg>
    <span>Mapas</span>
  </button>
  <button class="mnav-btn" id="mnToc">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h12"/></svg>
    <span>Índice</span>
  </button>
  <button class="mnav-btn" id="mnCard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
    <span>Tarjeta</span>
  </button>
  <button class="mnav-btn" id="mnSearch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span>Buscar</span>
  </button>
  <button class="mnav-btn" id="mnConn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><circle cx="18" cy="6" r="2"/><path d="M8 6h8M6 8v8M8 18l10-10"/></svg>
    <span>Conexiones</span>
  </button>
</nav>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <a href="index.html" class="brand">
    <span class="brand-mark"></span>
    <span>MedMaps</span>
  </a>
  <nav class="crumbs">
    <a href="index.html">Biblioteca</a>
    <span class="sep">›</span>
    <a href="#">Cardiología</a>
    <span class="sep">›</span>
    <span class="current">Fibrilación auricular</span>
  </nav>
  <div class="topbar-right">
    <div class="view-toggle" id="viewToggle">
      <button class="vt-btn active" data-view="ficha">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span class="lbl">Ficha</span>
      </button>
      <button class="vt-btn" data-view="mapa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="5" r="1.5"/><circle cx="4" cy="19" r="1.5"/><circle cx="20" cy="5" r="1.5"/><circle cx="20" cy="19" r="1.5"/><path d="M9.5 11 5 5.5M9.5 13 5 18.5M14.5 11 19 5.5M14.5 13 19 18.5"/></svg>
        <span class="lbl">Mapa</span>
      </button>
    </div>
    <select class="map-picker" id="mapPicker">
      <option value="">Cargando biblioteca…</option>
    </select>
    <button class="iconbtn" id="btnSearchTop" title="Buscar (⌘K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <span class="lbl">Buscar</span>
      <kbd>⌘K</kbd>
    </button>
    <button class="iconbtn" id="btnCardTop" title="Modo tarjeta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
      <span class="lbl">Tarjetas</span>
    </button>
    <button class="iconbtn primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
      <span class="lbl">Suscribirse</span>
    </button>
  </div>
</header>

<!-- ============ APP ============ -->
<div class="app">

  <!-- LEFT: TOC -->
  <aside class="toc" id="tocPanel">
    <div class="toc-head">
      <h3 class="toc-title">En esta página</h3>
      <div class="toc-prog"><div class="toc-prog-bar" id="tocBar"></div></div>
    </div>
    <ol class="toc-list" id="tocList"></ol>
    <div class="toc-foot">
      <button class="toc-action" id="tocCard"><span>◱</span> Modo tarjeta</button>
      <button class="toc-action" id="tocPrint"><span>⎙</span> Imprimir</button>
    </div>
  </aside>

  <!-- CENTER: FICHA -->
  <main class="ficha" id="fichaScroll">
    <article class="ficha-content" id="fichaContent">
      <!-- injected by JS -->
    </article>
  </main>

  <!-- CENTER: MAPA MENTAL -->
  <main class="mindmap" id="mindmapView">
    <div class="mindmap-canvas" id="mindmapCanvas"></div>
  </main>

  <!-- RIGHT: CONEXIONES -->
  <aside class="conn" id="connPanel">
    <div class="conn-head">
      <h3 class="conn-title">Conexiones</h3>
      <span class="conn-sub">Mapas relacionados</span>
    </div>
    <div class="conn-list" id="connList"></div>
    <div class="conn-sep"></div>
    <div class="conn-head">
      <h3 class="conn-title">Especialidad</h3>
    </div>
    <div class="conn-spec" id="connSpec"></div>
  </aside>
</div>

<!-- ============ SEARCH PALETTE ============ -->
<div class="palette" id="palette">
  <div class="palette-box">
    <div class="palette-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="paletteInput" placeholder="Buscar en el mapa y en la biblioteca…" autocomplete="off">
      <kbd>ESC</kbd>
    </div>
    <div class="palette-results" id="paletteResults"></div>
  </div>
</div>

<!-- ============ BACKDROP ============ -->
<div class="backdrop" id="backdrop"></div>

<!-- ============ TWEAKS ============ -->
<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <div class="tweaks-row">
    <label>Dirección visual</label>
    <div class="tweaks-options" data-group="theme">
      <button class="tweak-opt active" data-value="amboss">AMBOSS</button>
      <button class="tweak-opt" data-value="paper">Paper</button>
      <button class="tweak-opt" data-value="dark">Dark</button>
    </div>
  </div>
  <div class="tweaks-row">
    <label>Densidad</label>
    <div class="tweaks-options" data-group="density">
      <button class="tweak-opt" data-value="compact">Compacta</button>
      <button class="tweak-opt active" data-value="comfortable">Normal</button>
      <button class="tweak-opt" data-value="roomy">Amplia</button>
    </div>
  </div>
  <div class="tweaks-row">
    <label>Fuente de cuerpo</label>
    <div class="tweaks-options" data-group="bodyfont">
      <button class="tweak-opt active" data-value="sans">Sans</button>
      <button class="tweak-opt" data-value="serif">Serif</button>
    </div>
  </div>
  <div class="tweaks-row">
    <label>Modo tarjeta</label>
    <div class="tweaks-options" data-group="cards">
      <button class="tweak-opt active" data-value="off">Off</button>
      <button class="tweak-opt" data-value="on">On</button>
    </div>
  </div>
</div>

<!-- Legacy hardcoded maps (fallback/demo) -->
<script src="data/map-fa.js?v=3"></script>
<script src="data/map-inph.js?v=3"></script>
<!-- Pipeline dinámico: carga JSON generado por medmaps_sync.py -->
<script src="js/data-loader.js?v=1"></script>
<script src="js/mindmap.js?v=7"></script>
<script src="js/viewer.js?v=6"></script>

</body>
</html>
